<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
        }
        h1 {
            color: #f72585; /* Vice City Neon Pink */
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 3rem;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 10px #f72585;
        }
        h2 {
            color: #4cc9f0; /* Vice City Neon Cyan */
            font-weight: 400;
            margin-bottom: 50px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .countdown-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .time-box {
            background: rgba(31, 40, 51, 0.8);
            padding: 30px;
            border-radius: 12px;
            min-width: 100px;
            text-align: center;
            border: 2px solid #4cc9f0;
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.3);
        }
        .time-box span {
            display: block;
            font-size: 4rem;
            font-weight: bold;
        }
        .time-box .label {
            font-size: 1.2rem;
            text-transform: uppercase;
            color: #f72585;
            margin-top: 10px;
            font-weight: bold;
        }
        .footer {
            margin-top: 50px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>GTA 6 Release</h1>
    <h2>The £1,000 Bathroom Deadline</h2>

    <div class="countdown-wrapper" id="timer">
        <div class="time-box">
            <span id="days">00</span>
            <div class="label">Days</div>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <div class="label">Hours</div>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <div class="label">Minutes</div>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <div class="label">Seconds</div>
        </div>
    </div>

    <div class="footer">
        Target: November 19, 2026 @ 12:00 AM UTC
    </div>

    <script>
        // Set the precise GTA 6 release date and time (November 19, 2026 at 00:00:00 UTC)
        const targetDate = new Date("2026-11-19T00:00:00Z").getTime();

        const interval = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Time calculations for days, hours, minutes, and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Output the results with a leading zero if single digit
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            // What happens when the countdown hits zero
            if (distance < 0) {
                clearInterval(interval);
                document.getElementById("timer").innerHTML = "<h2 style='color: #f72585; font-size: 3rem; text-shadow: 0 0 15px #f72585;'>TIME'S UP! COUGH UP THE £1,000!</h2>";
            }
        }, 1000);
    </script>
</body>
</html>
